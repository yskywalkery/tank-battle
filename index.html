// Direction vectors: up, right, down, left
const DIRS = [{x:0,y:-1}, {x:1,y:0}, {x:0,y:1}, {x:-1,y:0}];
const DIR_UP = 0, DIR_RIGHT = 1, DIR_DOWN = 2, DIR_LEFT = 3;

class Tank {
    constructor(x, y, dir, color, isPlayer = false) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.color = color;
        this.isPlayer = isPlayer;
        this.speed = isPlayer ? 0.08 : 0.025;
        this.size = CELL * 0.4;
        this.shootCooldown = 0;
        this.shootDelay = isPlayer ? 20 : 80;
        this.hp = 1;
        this.flashTimer = 0;
    }

    update() {
        if (this.shootCooldown > 0) this.shootCooldown--;
        if (this.flashTimer > 0) this.flashTimer--;
    }

    move(dx, dy, walls, otherTanks) {
        const nx = this.x + dx;
        const ny = this.y + dy;
        if (!this.collides(nx, ny, walls, otherTanks)) {
            this.x = nx;
            this.y = ny;
            return true;
        }
        return false;
    }

    collides(x, y, walls, otherTanks) {
        const half = this.size;
        // Boundary check
        if (x - half < 0 || x + half > canvas.width || y - half < 0 || y + half > canvas.height) {
            return true;
        }
        // Wall collision
        for (const w of walls) {
            if (w.type === 0) continue;
            if (x + half > w.x && x - half < w.x + CELL && y + half > w.y && y - half < w.y + CELL) {
                return true;
            }
        }
        // Tank collision
        const allTanks = this.isPlayer ? enemies : [player, ...enemies.filter(e => e !== this)];
        if (!this.isPlayer) allTanks.push(player);
        for (const t of allTanks) {
            if (!t || t === this) continue;
            const dist = Math.hypot(x - t.x, y - t.y);
            if (dist < this.size + t.size) return true;
        }
        return false;
    }

    shoot() {
        if (this.shootCooldown > 0) return null;
        this.shootCooldown = this.shootDelay;
        const d = DIRS[this.dir];
        const bx = this.x + d.x * (this.size + 6);
        const by = this.y + d.y * (this.size + 6);
        return new Bullet(bx, by, this.dir, this.isPlayer);
    }

    draw(ctx) {
        if (this.flashTimer > 0 && Math.floor(this.flashTimer / 4) % 2 === 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.dir * Math.PI) / 2);

        const s = this.size;
        // Body
        ctx.fillStyle = this.color;
        ctx.fillRect(-s, -s * 0.85, s * 2, s * 1.7);
        // Tracks
        ctx.fillStyle = '#333';
        ctx.fillRect(-s - 2, -s * 0.85, 5, s * 1.7);
        ctx.fillRect(s - 3, -s * 0.85, 5, s * 1.7);
        // Track marks
        ctx.fillStyle = '#555';
        for (let i = -s * 0.7; i < s * 0.7; i += 5) {
            ctx.fillRect(-s - 1, i, 3, 3);
            ctx.fillRect(s - 2, i, 3, 3);
        }
        // Turret
        ctx.fillStyle = this.isPlayer ? '#4f4' : '#f66';
        ctx.fillRect(-4, -s * 0.5, 8, s * 1.2);
        // Barrel
        ctx.fillStyle = this.isPlayer ? '#3a3' : '#c33';
        ctx.fillRect(-3, -s * 1.35, 6, s * 0.85);

        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, dir, isPlayer) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.isPlayer = isPlayer;
        this.speed = 0.18;
        this.size = 3.5;
        this.alive = true;
    }

    update(walls) {
        const d = DIRS[this.dir];
        this.x += d.x * this.speed * CELL;
        this.y += d.y * this.speed * CELL;
        // Boundary
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
            this.alive = false;
            return;
        }
        // Wall collision
        for (const w of walls) {
            if (w.type === 0) continue;
            if (this.x > w.x && this.x < w.x + CELL && this.y > w.y && this.y < w.y + CELL) {
                this.alive = false;
                if (w.type === 2) {
                    w.type = 0;
                    spawnParticles(w.x + CELL / 2, w.y + CELL / 2, '#a88', 6);
                } else {
                    spawnParticles(this.x, this.y, '#ff0', 3);
                }
                return;
            }
        }
    }

    draw(ctx) {
        ctx.fillStyle = this.isPlayer ? '#ff0' : '#f88';
        ctx.shadowColor = this.isPlayer ? '#ff0' : '#f44';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class PowerUp {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'speed', 'rapid', 'shield', 'bomb'
        this.size = CELL * 0.35;
        this.timer = 600;
        this.alpha = 1;
    }

    update() {
        this.timer--;
        if (this.timer < 120 && Math.floor(this.timer / 10) % 2 === 0) {
            this.alpha = 0.3;
        } else {
            this.alpha = 1;
        }
        return this.timer > 0;
    }

    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        const x = this.x, y = this.y, s = this.size;
        ctx.fillStyle = {speed:'#0ff', rapid:'#f0f', shield:'#ff0', bomb:'#f80'}[this.type];
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 8;
        ctx.fillRect(x - s, y - s, s * 2, s * 2);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = `${s}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const icons = {speed:'⚡', rapid:'🔥', shield:'🛡', bomb:'💣'};
        ctx.fillText(icons[this.type], x, y);
        ctx.restore();
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x, y, color,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 20 + Math.random() * 20,
            maxLife: 40,
            size: 2 + Math.random() * 3,
        });
    }
}

function loadMap(mapData) {
    walls = [];
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            const type = mapData[y * COLS + x];
            if (type > 0) {
                walls.push({ x: x * CELL, y: y * CELL, type });
            }
        }
    }
}

function getMapForWave(w) {
    return MAPS[Math.min(w - 1, MAPS.length - 1)];
}

function spawnEnemy() {
    const edges = [
        { x: CELL * 1.5, y: CELL * 1.5 },
        { x: canvas.width - CELL * 1.5, y: CELL * 1.5 },
        { x: canvas.width - CELL * 1.5, y: canvas.height - CELL * 1.5 },
        { x: CELL * 1.5, y: canvas.height - CELL * 1.5 },
    ];
    const spawn = edges[Math.floor(Math.random() * edges.length)];
    // Check spawn clear
    const temp = new Tank(spawn.x, spawn.y, DIR_DOWN, '#f44');
    if (temp.collides(spawn.x, spawn.y, walls, []) || Math.hypot(spawn.x - player.x, spawn.y - player.y) < CELL * 5) {
        return;
    }
    const dir = Math.floor(Math.random() * 4);
    const hp = wave >= 3 ? (Math.random() < 0.3 ? 2 : 1) : 1;
    const enemy = new Tank(spawn.x, spawn.y, dir, hp > 1 ? '#f80' : '#e44');
    enemy.hp = hp;
    enemy.shootDelay = 60 + Math.random() * 60 - wave * 5;
    enemies.push(enemy);
}

function enemyAI(enemy) {
    // Move randomly, prefer moving toward player
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const dist = Math.hypot(dx, dy);

    // Shooting - always face player and shoot if aligned
    if (dist < CELL * 12) {
        if (Math.abs(dx) > Math.abs(dy)) {
            enemy.dir = dx > 0 ? DIR_RIGHT : DIR_LEFT;
        } else {
            enemy.dir = dy > 0 ? DIR_DOWN : DIR_UP;
        }
        // Shoot when roughly aligned
        const aligned = (enemy.dir === DIR_LEFT || enemy.dir === DIR_RIGHT) ? Math.abs(dy) < CELL : Math.abs(dx) < CELL;
        if (aligned && Math.random() < 0.03) {
            const b = enemy.shoot();
            if (b) bullets.push(b);
        }
    } else if (Math.random() < 0.02) {
        enemy.dir = Math.floor(Math.random() * 4);
    }

    // Move forward
    const d = DIRS[enemy.dir];
    const moved = enemy.move(d.x * enemy.speed * CELL, d.y * enemy.speed * CELL, walls, enemies);
    if (!moved && Math.random() < 0.05) {
        enemy.dir = Math.floor(Math.random() * 4);
    }
}

function checkBulletHits() {
    for (const b of bullets) {
        if (!b.alive) continue;
        if (b.isPlayer) {
            // Hit enemy
            for (const e of enemies) {
                const dist = Math.hypot(b.x - e.x, b.y - e.y);
                if (dist < e.size + b.size) {
                    b.alive = false;
                    e.hp--;
                    e.flashTimer = 8;
                    if (e.hp <= 0) {
                        spawnParticles(e.x, e.y, '#f44', 15);
                        spawnParticles(e.x, e.y, '#ff0', 8);
                        enemies.splice(enemies.indexOf(e), 1);
                        score += 100;
                        kills++;
                        shakeTimer = 8;
                        shakeIntensity = 3;
                        updateUI();
                        // Maybe drop power-up
                        if (Math.random() < 0.15) {
                            const types = ['speed', 'rapid', 'shield', 'bomb'];
                            powerUps.push(new PowerUp(e.x, e.y, types[Math.floor(Math.random() * types.length)]));
                        }
                    }
                    break;
                }
            }
        } else {
            // Hit player
            if (invincibleTimer > 0) continue;
            const dist = Math.hypot(b.x - player.x, b.y - player.y);
            if (dist < player.size + b.size) {
                b.alive = false;
                playerHit();
            }
        }
    }
}

function playerHit() {
    if (invincibleTimer > 0) return;
    lives--;
    spawnParticles(player.x, player.y, '#4f4', 12);
    shakeTimer = 12;
    shakeIntensity = 6;
    updateUI();
    if (lives <= 0) {
        endGame();
    } else {
        invincibleTimer = 90;
        player.flashTimer = 90;
        // Reset player position
        player.x = canvas.width / 2;
        player.y = canvas.height - CELL * 2;
        player.dir = DIR_UP;
    }
}

function checkPowerUpCollision() {
    for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i];
        const dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < player.size + p.size) {
            applyPowerUp(p.type);
            powerUps.splice(i, 1);
        }
    }
}

function applyPowerUp(type) {
    switch (type) {
        case 'speed':
            player.speed = 0.14;
            setTimeout(() => { if (player) player.speed = 0.08; }, 8000);
            break;
        case 'rapid':
            player.shootDelay = 8;
            setTimeout(() => { if (player) player.shootDelay = 20; }, 8000);
            break;
        case 'shield':
            invincibleTimer = Math.max(invincibleTimer, 180);
            player.flashTimer = 180;
            break;
        case 'bomb':
            for (const e of [...enemies]) {
                spawnParticles(e.x, e.y, '#f44', 12);
                enemies.splice(enemies.indexOf(e), 1);
                score += 100;
                kills++;
            }
            shakeTimer = 16;
            shakeIntensity = 8;
            updateUI();
            break;
    }
}

function endGame() {
    gameOver = true;
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('go-score').textContent = `最终得分: ${score} | 击杀: ${kills} | 波次: ${wave}`;
}

function restartGame() {
    score = 0;
    lives = 3;
    kills = 0;
    wave = 1;
    gameOver = false;
    enemies = [];
    bullets = [];
    particles = [];
    powerUps = [];
    spawnTimer = 0;
    invincibleTimer = 60;
    shakeTimer = 0;
    player = new Tank(canvas.width / 2, canvas.height - CELL * 2, DIR_UP, '#4a4', true);
    player.flashTimer = 60;
    loadMap(getMapForWave(wave));
    document.getElementById('game-over').style.display = 'none';
    updateUI();
}

function nextWave() {
    wave++;
    enemies = [];
    bullets = [];
    powerUps = [];
    spawnTimer = 0;
    loadMap(getMapForWave(wave));
    invincibleTimer = 60;
    player.flashTimer = 60;
    player.x = canvas.width / 2;
    player.y = canvas.height - CELL * 2;
    updateUI();
    document.getElementById('wave').textContent = wave;
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('kills').textContent = kills;
    document.getElementById('wave').textContent = wave;
}

// Input handling
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        if (!gameOver && player.shootCooldown <= 0) {
            const b = player.shoot();
            if (b) bullets.push(b);
        }
    }
    if (e.key === 'r' || e.key === 'R') {
        if (gameOver) restartGame();
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
        e.preventDefault();
    }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function handleInput() {
    if (gameOver) return;
    let dx = 0, dy = 0, dir = player.dir;
    if (keys['w'] || keys['W'] || keys['ArrowUp']) { dy = -1; dir = DIR_UP; }
    else if (keys['s'] || keys['S'] || keys['ArrowDown']) { dy = 1; dir = DIR_DOWN; }
    else if (keys['a'] || keys['A'] || keys['ArrowLeft']) { dx = -1; dir = DIR_LEFT; }
    else if (keys['d'] || keys['D'] || keys['ArrowRight']) { dx = 1; dir = DIR_RIGHT; }

    if (dx !== 0 || dy !== 0) {
        player.dir = dir;
        player.move(dx * player.speed * CELL, dy * player.speed * CELL, walls, enemies);
    }
}

// Main game loop
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Screen shake
    let sx = 0, sy = 0;
    if (shakeTimer > 0) {
        sx = (Math.random() - 0.5) * shakeIntensity * 2;
        sy = (Math.random() - 0.5) * shakeIntensity * 2;
        shakeTimer--;
    }
    ctx.save();
    ctx.translate(sx, sy);

    // Draw grid
    ctx.strokeStyle = '#1a1a30';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
    }

    // Draw walls
    for (const w of walls) {
        if (w.type === 0) continue;
        const x = w.x, y = w.y;
        if (w.type === 1) {
            // Steel
            ctx.fillStyle = '#778';
            ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
            ctx.fillStyle = '#99a';
            ctx.fillRect(x + 3, y + 3, CELL - 6, CELL - 6);
            ctx.fillStyle = '#556';
            ctx.fillRect(x + 5, y + 5, CELL - 10, CELL - 10);
        } else {
            // Brick
            ctx.fillStyle = '#b44';
            ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
            ctx.strokeStyle = '#833';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
            // Brick lines
            ctx.beginPath();
            ctx.moveTo(x + 1, y + CELL / 2);
            ctx.lineTo(x + CELL - 1, y + CELL / 2);
            ctx.moveTo(x + CELL / 2, y + 1);
            ctx.lineTo(x + CELL / 2, y + CELL / 2);
            ctx.moveTo(x + CELL / 4, y + CELL / 2);
            ctx.lineTo(x + CELL / 4, y + CELL - 1);
            ctx.moveTo(x + CELL * 3 / 4, y + CELL / 2);
            ctx.lineTo(x + CELL * 3 / 4, y + CELL - 1);
            ctx.stroke();
        }
    }

    if (!gameOver) {
        // Update
        handleInput();
        player.update();
        if (invincibleTimer > 0) invincibleTimer--;

        for (const e of enemies) {
            e.update();
            enemyAI(e);
        }
        for (const b of bullets) b.update(walls);
        bullets = bullets.filter(b => b.alive);

        checkBulletHits();
        checkPowerUpCollision();

        // Update power-ups
        for (const p of powerUps) p.update();
        powerUps = powerUps.filter(p => p.timer > 0);

        // Update particles
        for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
        }
        particles = particles.filter(p => p.life > 0);

        // Spawn enemies
        spawnTimer++;
        const maxEnemies = 3 + wave;
        const spawnRate = Math.max(40, 120 - wave * 10);
        if (spawnTimer >= spawnRate && enemies.length < maxEnemies) {
            spawnTimer = 0;
            spawnEnemy();
        }

        // Next wave
        const waveKillTarget = 4 + wave * 2;
        if (kills >= waveKillTarget && enemies.length === 0) {
            nextWave();
        }
    }

    // Draw power-ups
    for (const p of powerUps) p.draw(ctx);

    // Draw particles
    for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Draw bullets
    for (const b of bullets) b.draw(ctx);

    // Draw enemies
    for (const e of enemies) e.draw(ctx);

    // Draw player
    player.draw(ctx);

    // Draw shield effect
    if (invincibleTimer > 0) {
        ctx.strokeStyle = `rgba(255,255,0,${0.5 + Math.sin(Date.now() / 80) * 0.3})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size + 6, 0, Math.PI * 2);
        ctx.stroke();
    }

    ctx.restore();

    // Draw minimap border indicator
    if (invincibleTimer > 0) {
        ctx.strokeStyle = `rgba(255,255,0,${0.3 + Math.sin(Date.now() / 100) * 0.2})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
    }

    requestAnimationFrame(gameLoop);
}

// Initialize
player = new Tank(canvas.width / 2, canvas.height - CELL * 2, DIR_UP, '#4a4', true);
loadMap(getMapForWave(1));
invincibleTimer = 60;
player.flashTimer = 60;
updateUI();
gameLoop();
</script>
</body>
